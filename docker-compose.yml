version: "3.9"
services:
  postgresdb:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_class_2_db
    ports:
      - "5430:5432"
    volumes:
      - "postgres_booking_data:/var/lib/postgresql/data"
volumes:
  postgres_booking_data:
